<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: radial-gradient(#0056b3, #a200ff);
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h2 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        form {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            width: 350px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        table {
            width: 100%;
        }

        td {
            padding: 10px 0;
        }

        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #888;
            border-radius: 4px;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #result {
            margin-top: 20px;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            width: 350px;
            text-align: left;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        #result h3 {
            margin-top: 0;
        }
    </style>
</head>

<body>

    <h2>Order</h2>

    <form>
        <table>
            <tr>
                <td>Product name</td>
                <td><input id="name" type="text" placeholder="Enter product name"></td>
            </tr>

            <tr>
                <td>Quantity</td>
                <td><input id="quantity" type="number" placeholder="Enter total number of toys"></td>
            </tr>

            <tr>
                <td>Contact no.</td>
                <td><input id="number" type="number" placeholder="Enter phone number"></td>
            </tr>

            <tr>
                <td>Address</td>
                <td><input id="address" type="text" placeholder="Enter delivery address"></td>
            </tr>
        </table>

        <button type="submit">Submit</button>
    </form>

    <script>
        const form = document.querySelector("form");

        form.addEventListener("submit", function(event) {
            event.preventDefault();

            const name = document.getElementById("name").value;
            const quantity = document.getElementById("quantity").value;
            const number = document.getElementById("number").value;
            const address = document.getElementById("address").value;

            const output = `
                Product Name: ${name} <br>
                Quantity: ${quantity} <br>
                Contact No.: ${number} <br>
                Address: ${address}
            `;

            let resultDiv = document.getElementById("result");
            if (!resultDiv) {
                resultDiv = document.createElement("div");
                resultDiv.id = "result";
                document.body.appendChild(resultDiv);
            }

            resultDiv.innerHTML = "<h3>Entered Details:</h3>" + output;
        });
    </script>


</html>
